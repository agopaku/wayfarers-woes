<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelogue DSLR Photo Review Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --border: #334155;
            --radius-lg: 16px;
            --radius-md: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            padding-bottom: 100px;
        }

        header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 1px solid var(--border);
            padding: 24px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .stats-badge {
            background-color: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 40px;
        }

        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        .filter-tabs {
            display: flex;
            background-color: #0f172a;
            border: 1px solid var(--border);
            padding: 4px;
            border-radius: var(--radius-md);
        }

        .filter-tab {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border: none;
            background: none;
            transition: var(--transition);
        }

        .filter-tab.active {
            background-color: var(--card-bg);
            color: var(--text-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 32px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.5);
            border-color: #475569;
        }

        .image-container {
            width: 100%;
            height: 280px;
            background-color: #0f172a;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .image-container:hover img {
            transform: scale(1.05);
        }

        .card-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background-color: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
            color: var(--text-color);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            border: 1px solid var(--border);
        }

        .card-content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .meta-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .filename {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-color);
            word-break: break-all;
        }

        .folder-date {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .exif-details {
            font-size: 12px;
            color: var(--text-muted);
            background-color: #0f172a;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .decision-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .decision-btn {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            border: 1px solid var(--border);
            background-color: #0f172a;
            color: var(--text-muted);
        }

        .decision-btn:hover {
            color: var(--text-color);
            border-color: #475569;
        }

        .btn-approve.selected {
            background-color: var(--success-bg);
            border-color: var(--success);
            color: var(--success);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.15);
        }

        .btn-reject.selected {
            background-color: var(--danger-bg);
            border-color: var(--danger);
            color: var(--danger);
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.15);
        }

        /* Detail Form (shows only when approved) */
        .detail-form {
            display: none;
            flex-direction: column;
            gap: 12px;
            border-top: 1px dashed var(--border);
            padding-top: 16px;
            animation: slideDown 0.3s ease forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .input-field {
            background-color: #0f172a;
            border: 1px solid var(--border);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            width: 100%;
            transition: var(--transition);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        textarea.input-field {
            resize: vertical;
            min-height: 60px;
        }

        .select-field {
            cursor: pointer;
        }

        /* Floating action bar at bottom */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #0f172a;
            border-top: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
        }

        .bottom-bar-info {
            display: flex;
            gap: 24px;
        }

        .info-stat {
            display: flex;
            flex-direction: column;
        }

        .info-stat .label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .info-stat .value {
            font-size: 18px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
        }

        .submit-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .submit-btn:disabled {
            background-color: #334155;
            color: #64748b;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Modal styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-icon {
            width: 72px;
            height: 72px;
            background-color: var(--success-bg);
            border: 2px solid var(--success);
            color: var(--success);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            margin: 0 auto 24px;
        }

        .modal-title {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .modal-text {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .modal-btn {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
        }

        .modal-btn:hover {
            background-color: #059669;
        }

        /* Fullscreen Image Preview Modal */
        .preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1100;
        }

        .preview-img-container {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .preview-img-container img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .preview-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
            background: none;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>Travelogue Photo Curation Portal</h1>
            <p>Review remaining candidates and import them into the gallery</p>
        </div>
        <div id="statsBadge" class="stats-badge">Loading...</div>
    </header>

    <div class="container">
        <div class="filter-bar">
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="setFilter('all')">All (<span id="count-all">0</span>)</button>
                <button class="filter-tab" onclick="setFilter('undecided')">Undecided (<span id="count-undecided">0</span>)</button>
                <button class="filter-tab" onclick="setFilter('approve')">Approve (<span id="count-approve">0</span>)</button>
                <button class="filter-tab" onclick="setFilter('reject')">Reject (<span id="count-reject">0</span>)</button>
            </div>
        </div>

        <div id="grid" class="grid">
            <!-- Cards will be dynamically inserted here -->
        </div>
    </div>

    <div class="bottom-bar">
        <div class="bottom-bar-info">
            <div class="info-stat">
                <span class="label">Approved</span>
                <span id="stat-approved" class="value" style="color: var(--success);">0</span>
            </div>
            <div class="info-stat">
                <span class="label">Rejected</span>
                <span id="stat-rejected" class="value" style="color: var(--danger);">0</span>
            </div>
            <div class="info-stat">
                <span class="label">Remaining</span>
                <span id="stat-remaining" class="value">0</span>
            </div>
        </div>
        <button id="submitBtn" class="submit-btn" disabled onclick="submitReviews()">
            Apply and Save Reviews
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        </button>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon">✓</div>
            <h3 class="modal-title">Reviews Saved Successfully</h3>
            <p id="modalMsg" class="modal-text">Processed reviews successfully. The approved photos have been optimized and imported into the gallery.</p>
            <button class="modal-btn" onclick="closeModal()">Awesome</button>
        </div>
    </div>

    <!-- Fullscreen Image Preview Modal -->
    <div id="previewModal" class="preview-overlay" onclick="closePreview()">
        <div class="preview-img-container" onclick="event.stopPropagation()">
            <button class="preview-close" onclick="closePreview()">&times;</button>
            <img id="previewImage" src="" alt="Fullscreen preview">
        </div>
    </div>

    <script>
        let candidates = [];
        let reviews = {}; // mapping of cand_id to { status: 'approve'|'reject'|'none', title, description, location, category }
        let currentFilter = 'all';

        // Load candidates on start
        window.addEventListener('DOMContentLoaded', () => {
            fetch('/api/candidates')
                .then(res => res.json())
                .then(data => {
                    candidates = data;
                    // Initialize reviews state
                    candidates.forEach(c => {
                        reviews[c.cand_id] = {
                            status: c.status || 'none',
                            title: c.title || '',
                            description: c.description || '',
                            location: c.location || '',
                            category: c.category || 'landscape'
                        };
                    });
                    updateStats();
                    renderGrid();
                })
                .catch(err => {
                    console.error("Error loading candidates:", err);
                    document.getElementById('grid').innerHTML = '<div style="color: var(--danger); font-size: 18px; font-weight: 600; text-align: center; grid-column: 1/-1; padding: 40px;">Failed to load photo candidates. Make sure the local python server is running.</div>';
                });
        });

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            let filtered = candidates.filter(c => {
                const status = reviews[c.cand_id].status;
                if (currentFilter === 'all') return true;
                if (currentFilter === 'undecided') return status === 'none';
                if (currentFilter === 'approve') return status === 'approve';
                if (currentFilter === 'reject') return status === 'reject';
                return true;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div style="color: var(--text-muted); text-align: center; grid-column: 1/-1; padding: 60px; font-size: 16px; border: 1px dashed var(--border); border-radius: var(--radius-lg);">No photos match the current filter.</div>';
                return;
            }

            filtered.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${c.cand_id}`;

                const meta = c.metadata;
                const exifParts = [];
                if (meta.camera) exifParts.push(`Camera: ${meta.camera}`);
                if (meta.lens) exifParts.push(`Lens: ${meta.lens}`);
                if (meta.aperture) exifParts.push(`Aperture: ${meta.aperture}`);
                if (meta.shutter_speed) exifParts.push(`Shutter: ${meta.shutter_speed}`);
                if (meta.iso) exifParts.push(`ISO: ${meta.iso}`);
                if (meta.focal_length) exifParts.push(`Focal: ${meta.focal_length}`);
                
                const exifHTML = exifParts.map(p => `<span>${p}</span>`).join('');
                
                const reviewState = reviews[c.cand_id];
                const approveSelected = reviewState.status === 'approve' ? 'selected' : '';
                const rejectSelected = reviewState.status === 'reject' ? 'selected' : '';
                const formStyle = reviewState.status === 'approve' ? 'display: flex;' : 'display: none;';

                card.innerHTML = `
                    <div class="image-container" onclick="openPreview('${c.preview_url}')">
                        <span class="card-badge">${c.cand_id}</span>
                        <img src="${c.preview_url}" alt="Preview" loading="lazy">
                    </div>
                    <div class="card-content">
                        <div class="meta-header">
                            <div>
                                <div class="filename">${c.filename}</div>
                                <div class="folder-date">Folder: ${c.folder} &bull; Taken: ${meta.date_taken || 'Unknown'}</div>
                            </div>
                        </div>

                        <div class="exif-details">
                            ${exifHTML || 'No EXIF details available'}
                        </div>

                        <!-- Curated Catchy Title and Story -->
                        <div class="curated-info" style="margin-bottom: 20px; border-left: 3px solid var(--primary); padding-left: 12px; background: rgba(59, 130, 246, 0.03); padding-top: 8px; padding-bottom: 8px; border-radius: 0 var(--radius-md) var(--radius-md) 0;">
                            <div class="curated-title" style="font-weight: 700; font-size: 15px; color: var(--text-color); margin-bottom: 4px;">${c.title || 'Untitled'}</div>
                            <div class="curated-location" style="font-size: 12px; color: #60a5fa; font-weight: 600; margin-bottom: 8px;">📍 ${c.location || 'Unknown Location'}</div>
                            <div class="curated-desc" style="font-size: 13px; color: var(--text-muted); line-height: 1.4; font-style: italic;">"${c.description || 'No description available.'}"</div>
                        </div>

                        <div class="decision-buttons">
                            <button class="decision-btn btn-approve ${approveSelected}" onclick="setDecision('${c.cand_id}', 'approve')">
                                Approve ✅
                            </button>
                            <button class="decision-btn btn-reject ${rejectSelected}" onclick="setDecision('${c.cand_id}', 'reject')">
                                Reject ❌
                            </button>
                        </div>

                        <div id="form-${c.cand_id}" class="detail-form" style="${formStyle}">
                            <div class="input-group">
                                <label for="title-${c.cand_id}">Title (Optional)</label>
                                <input type="text" id="title-${c.cand_id}" class="input-field" placeholder="e.g. Scenic Overlook" value="${reviewState.title}" oninput="updateFormData('${c.cand_id}', 'title', this.value); saveReviewDebounced('${c.cand_id}')">
                            </div>
                            <div class="input-group">
                                <label for="desc-${c.cand_id}">Story / Description (Optional)</label>
                                <textarea id="desc-${c.cand_id}" class="input-field" placeholder="Share a brief memory..." oninput="updateFormData('${c.cand_id}', 'desc', this.value); saveReviewDebounced('${c.cand_id}')">${reviewState.description}</textarea>
                            </div>
                            <div class="input-group">
                                <label for="loc-${c.cand_id}">Location (Optional)</label>
                                <input type="text" id="loc-${c.cand_id}" class="input-field" placeholder="City, State, Country" value="${reviewState.location}" oninput="updateFormData('${c.cand_id}', 'location', this.value); saveReviewDebounced('${c.cand_id}')">
                            </div>
                            <div class="input-group">
                                <label for="cat-${c.cand_id}">Category</label>
                                <select id="cat-${c.cand_id}" class="input-field select-field" onchange="updateFormData('${c.cand_id}', 'category', this.value); saveReviewToServer('${c.cand_id}')">
                                    <option value="landscape" ${reviewState.category === 'landscape' ? 'selected' : ''}>Landscape / Nature</option>
                                    <option value="portrait" ${reviewState.category === 'portrait' ? 'selected' : ''}>Portrait / Candid</option>
                                </select>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function setDecision(candId, decision) {
            const currentState = reviews[candId].status;
            
            // Toggle decision (if clicked again, reset to none)
            if (currentState === decision) {
                reviews[candId].status = 'none';
            } else {
                reviews[candId].status = decision;
            }

            // Update UI components
            const card = document.getElementById(`card-${candId}`);
            const btnApprove = card.querySelector('.btn-approve');
            const btnReject = card.querySelector('.btn-reject');
            const detailForm = document.getElementById(`form-${candId}`);

            btnApprove.classList.remove('selected');
            btnReject.classList.remove('selected');
            detailForm.style.display = 'none';

            if (reviews[candId].status === 'approve') {
                btnApprove.classList.add('selected');
                detailForm.style.display = 'flex';
            } else if (reviews[candId].status === 'reject') {
                btnReject.classList.add('selected');
            }

            updateStats();
            
            // Save immediately to server
            saveReviewToServer(candId);

            // If a filter is active and we toggled away, re-filter the list after a small delay
            if (currentFilter !== 'all') {
                setTimeout(() => {
                    renderGrid();
                }, 300);
            }
        }

        function updateFormData(candId, key, value) {
            if (key === 'title') {
                reviews[candId].title = value;
                const card = document.getElementById(`card-${candId}`);
                if (card) card.querySelector('.curated-title').innerText = value || 'Untitled';
            }
            if (key === 'desc') {
                reviews[candId].description = value;
                const card = document.getElementById(`card-${candId}`);
                if (card) card.querySelector('.curated-desc').innerText = value ? `"${value}"` : '"No description available."';
            }
            if (key === 'location') {
                reviews[candId].location = value;
                const card = document.getElementById(`card-${candId}`);
                if (card) card.querySelector('.curated-location').innerText = `📍 ${value || 'Unknown Location'}`;
            }
            if (key === 'category') reviews[candId].category = value;
        }

        function saveReviewToServer(candId) {
            const r = reviews[candId];
            fetch('/api/review/update', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    cand_id: candId,
                    status: r.status,
                    title: r.title,
                    description: r.description,
                    location: r.location,
                    category: r.category
                })
            })
            .then(res => res.json())
            .then(data => {
                if (!data.success) {
                    console.error("Failed to save review to server:", data.message);
                }
            })
            .catch(err => {
                console.error("Error saving review to server:", err);
            });
        }

        let debounceTimers = {};
        function saveReviewDebounced(candId) {
            if (debounceTimers[candId]) {
                clearTimeout(debounceTimers[candId]);
            }
            debounceTimers[candId] = setTimeout(() => {
                saveReviewToServer(candId);
            }, 600);
        }

        function updateStats() {
            let approved = 0;
            let rejected = 0;
            let undecided = 0;

            candidates.forEach(c => {
                const s = reviews[c.cand_id].status;
                if (s === 'approve') approved++;
                else if (s === 'reject') rejected++;
                else undecided++;
            });

            document.getElementById('stat-approved').innerText = approved;
            document.getElementById('stat-rejected').innerText = rejected;
            document.getElementById('stat-remaining').innerText = undecided;

            document.getElementById('count-all').innerText = candidates.length;
            document.getElementById('count-undecided').innerText = undecided;
            document.getElementById('count-approve').innerText = approved;
            document.getElementById('count-reject').innerText = rejected;

            document.getElementById('statsBadge').innerText = `${approved + rejected} / ${candidates.length} Reviewed`;

            const submitBtn = document.getElementById('submitBtn');
            if (approved > 0 || rejected > 0) {
                submitBtn.removeAttribute('disabled');
            } else {
                submitBtn.setAttribute('disabled', 'true');
            }
        }

        function setFilter(filterType) {
            currentFilter = filterType;
            document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            renderGrid();
        }

        function submitReviews() {
            const approvalsToSend = [];
            const rejectionsToSend = [];

            candidates.forEach(c => {
                const r = reviews[c.cand_id];
                if (r.status === 'approve') {
                    approvalsToSend.push({
                        cand_id: c.cand_id,
                        title: r.title || null,
                        description: r.description || null,
                        location: r.location || null,
                        category: r.category
                    });
                } else if (r.status === 'reject') {
                    rejectionsToSend.push(c.cand_id);
                }
            });

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "Processing Reviews...";
            submitBtn.setAttribute('disabled', 'true');

            fetch('/api/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    approvals: approvalsToSend,
                    rejections: rejectionsToSend
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('modalMsg').innerText = `Successfully processed your batch! Imported ${approvalsToSend.length} approved photos and excluded ${rejectionsToSend.length} photos.`;
                    document.getElementById('successModal').classList.add('active');
                } else {
                    alert("Failed to submit reviews: " + data.message);
                    submitBtn.innerText = "Apply and Save Reviews";
                    submitBtn.removeAttribute('disabled');
                }
            })
            .catch(err => {
                alert("Error submitting reviews. Make sure the server is still running.");
                submitBtn.innerText = "Apply and Save Reviews";
                submitBtn.removeAttribute('disabled');
            });
        }

        function closeModal() {
            document.getElementById('successModal').classList.remove('active');
            // Reload page to show remaining active candidates
            window.location.reload();
        }

        function openPreview(url) {
            document.getElementById('previewImage').src = url;
            document.getElementById('previewModal').style.display = 'flex';
        }

        function closePreview() {
            document.getElementById('previewModal').style.display = 'none';
        }
    </script>
</body>
</html>
